name: 每日构建 MSM（稳定版）

on:
  schedule:
    # 每天北京时间凌晨 4 点（UTC 时间 20:00）
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: '是否强制更新'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-build-stable-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  prepare:
    name: 准备构建信息
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_version: ${{ steps.meta.outputs.base_version }}
      channel: ${{ steps.meta.outputs.channel }}
      channel_name: ${{ steps.meta.outputs.channel_name }}
      is_stable: ${{ steps.meta.outputs.is_stable }}
      is_beta: ${{ steps.meta.outputs.is_beta }}
      release_notes_path: ${{ steps.meta.outputs.release_notes_path }}
      latest_marker: ${{ steps.meta.outputs.latest_marker }}
      history_marker: ${{ steps.meta.outputs.history_marker }}
      docker_channel_tag: ${{ steps.meta.outputs.docker_channel_tag }}
      release_docs_url: ${{ steps.meta.outputs.release_docs_url }}
      install_script_name: ${{ steps.meta.outputs.install_script_name }}
      install_script_url: ${{ steps.meta.outputs.install_script_url }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      commit_sha_short: ${{ steps.meta.outputs.commit_sha_short }}
      branch: ${{ steps.meta.outputs.branch }}
      changelog: ${{ steps.meta.outputs.changelog }}
      commit_message: ${{ steps.meta.outputs.commit_message }}
      commit_author: ${{ steps.meta.outputs.commit_author }}
      commit_date: ${{ steps.meta.outputs.commit_date }}
      build_time: ${{ steps.meta.outputs.build_time }}
      previous_release_published_at: ${{ steps.meta.outputs.previous_release_published_at }}
      log_since_epoch: ${{ steps.meta.outputs.log_since_epoch }}
      log_until_epoch: ${{ steps.meta.outputs.log_until_epoch }}
      previous_version: ${{ steps.meta.outputs.previous_version }}
      previous_version_commit: ${{ steps.meta.outputs.previous_version_commit }}
      commit_count: ${{ steps.meta.outputs.commit_count }}
      ai_summary: ${{ steps.ai_summary.outputs.summary }}
      force_update: ${{ steps.meta.outputs.force_update }}
      skip: ${{ steps.meta.outputs.skip }}
    steps:
      - name: Checkout MSM 仓库
        uses: actions/checkout@v4
        with:
          repository: msm9527/msm
          ref: main
          token: ${{ secrets.MSM_REPO_TOKEN }}
          fetch-depth: 0

      - name: 读取版本信息
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # 优先从仓库根目录的 .version 文件读取版本号（msm 主仓库的单一真实版本源）
          if [ -f ".version" ]; then
            VERSION="$(tr -d '[:space:]' < .version)"
          else
            VERSION=""
          fi

          # 兼容旧版本：如果 .version 缺失，则回退到从源码中解析（避免旧分支直接报错）
          if [ -z "${VERSION}" ]; then
            VERSION="$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' backend/cmd/msm/commands/root.go | head -n 1 || true)"
          fi

          if [ -z "${VERSION}" ]; then
            echo "error: 无法从 .version 或 backend/cmd/msm/commands/root.go 获取版本号" >&2
            exit 1
          fi

          BRANCH="main"
          CHANNEL="stable"
          CHANNEL_NAME="稳定版"
          IS_STABLE="true"
          IS_BETA="false"
          DOCKER_CHANNEL_TAG="latest"
          RELEASE_NOTES_PATH="docs/zh/guide/releases.md"
          LATEST_MARKER="## 🚀 最新稳定版本"
          HISTORY_MARKER="## 📚 历史版本"
          RELEASE_DOCS_URL="https://msm9527.github.io/msm-wiki/zh/guide/releases.html"
          INSTALL_SCRIPT_NAME="install.sh"
          INSTALL_SCRIPT_URL="https://raw.githubusercontent.com/msm9527/msm-wiki/main/install.sh"

          BASE_VERSION="${VERSION}"
          RELEASE_VERSION="${VERSION}"

          FORCE_UPDATE="${{ inputs.force_update || 'false' }}"
          COMMIT_SHA="$(git rev-parse HEAD)"
          COMMIT_SHA_SHORT="$(git rev-parse --short=7 HEAD)"

          # 获取最新提交信息
          COMMIT_MESSAGE="$(git log -1 --pretty=format:'%s')"
          COMMIT_AUTHOR="$(git log -1 --pretty=format:'%an')"
          COMMIT_EPOCH="$(git log -1 --format=%ct HEAD)"
          COMMIT_DATE="$(date -d "@${COMMIT_EPOCH}" +'%Y-%m-%d %H:%M:%S CST')"
          BUILD_TIME="$(date +'%Y-%m-%d %H:%M:%S CST')"

          # 按“上一版发布时间 -> 当前发布时间”统计提交范围
          PREVIOUS_VERSION=""
          PREVIOUS_VERSION_COMMIT=""
          PREVIOUS_RELEASE_PUBLISHED_AT=""
          LOG_SINCE_EPOCH=""
          LOG_UNTIL_EPOCH="${COMMIT_EPOCH}"
          CURRENT_RELEASE_TIME="$(date -d "@${LOG_UNTIL_EPOCH}" +'%Y-%m-%d %H:%M:%S CST')"

          RELEASES_API="https://api.github.com/repos/msm9527/msm-wiki/releases?per_page=100"
          RELEASES_JSON="$(curl -fsSL "${RELEASES_API}" 2>/dev/null || echo '[]')"

          if command -v jq >/dev/null 2>&1; then
            if [ "${CHANNEL}" = "beta" ]; then
              PREVIOUS_RELEASE_PUBLISHED_AT="$(echo "${RELEASES_JSON}" | jq -r --arg current_tag "${RELEASE_VERSION}" '[.[] | select(.draft == false and .prerelease == true and (.tag_name | startswith("beta-")) and .tag_name != $current_tag and .published_at != null)] | sort_by(.published_at) | last | .published_at // empty' || true)"
            else
              PREVIOUS_RELEASE_PUBLISHED_AT="$(echo "${RELEASES_JSON}" | jq -r --arg current_tag "${RELEASE_VERSION}" '[.[] | select(.draft == false and .prerelease == false and ((.tag_name | startswith("beta-")) | not) and .tag_name != $current_tag and .published_at != null)] | sort_by(.published_at) | last | .published_at // empty' || true)"
            fi
          else
            echo "warning: jq 不可用，无法按发布时间窗口筛选发布记录" >&2
          fi

          if [ -n "${PREVIOUS_RELEASE_PUBLISHED_AT}" ]; then
            LOG_SINCE_EPOCH="$(date -d "${PREVIOUS_RELEASE_PUBLISHED_AT}" +%s 2>/dev/null || true)"
          fi

          if [ -n "${LOG_SINCE_EPOCH}" ] && [ "${LOG_SINCE_EPOCH}" -ge "${LOG_UNTIL_EPOCH}" ]; then
            echo "warning: 发布时间窗口异常（since=${LOG_SINCE_EPOCH} >= until=${LOG_UNTIL_EPOCH}），回退为最近 100 条提交"
            LOG_SINCE_EPOCH=""
          fi

          LOG_ARGS=( "--until=@${LOG_UNTIL_EPOCH}" )
          if [ -n "${LOG_SINCE_EPOCH}" ]; then
            PREVIOUS_VERSION="${PREVIOUS_RELEASE_PUBLISHED_AT}"
            LOG_ARGS+=( "--since=@${LOG_SINCE_EPOCH}" )
            echo "按发布时间窗口统计提交: ${PREVIOUS_RELEASE_PUBLISHED_AT} -> ${CURRENT_RELEASE_TIME}"
          else
            # 首次发布或未获取到上一版发布时间时，回退到最近 100 条提交
            LOG_ARGS=( "-100" "--until=@${LOG_UNTIL_EPOCH}" )
            echo "未找到上一版发布时间，回退为最近 100 条提交"
          fi

          CHANGELOG="$(git log "${LOG_ARGS[@]}" --pretty=format:'- [%h](https://github.com/msm9527/msm/commit/%H) %s _%an, %ar_' | sed 's/$/\\n/' | tr -d '\n')"
          COMMIT_COUNT="$(git log "${LOG_ARGS[@]}" --pretty=format:'%H' | sed '/^$/d' | wc -l | tr -d ' ')"

          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "channel_name=${CHANNEL_NAME}" >> "$GITHUB_OUTPUT"
          echo "is_stable=${IS_STABLE}" >> "$GITHUB_OUTPUT"
          echo "is_beta=${IS_BETA}" >> "$GITHUB_OUTPUT"
          echo "release_notes_path=${RELEASE_NOTES_PATH}" >> "$GITHUB_OUTPUT"
          echo "latest_marker=${LATEST_MARKER}" >> "$GITHUB_OUTPUT"
          echo "history_marker=${HISTORY_MARKER}" >> "$GITHUB_OUTPUT"
          echo "docker_channel_tag=${DOCKER_CHANNEL_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_docs_url=${RELEASE_DOCS_URL}" >> "$GITHUB_OUTPUT"
          echo "install_script_name=${INSTALL_SCRIPT_NAME}" >> "$GITHUB_OUTPUT"
          echo "install_script_url=${INSTALL_SCRIPT_URL}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_sha_short=${COMMIT_SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "commit_message=${COMMIT_MESSAGE}" >> "$GITHUB_OUTPUT"
          echo "commit_author=${COMMIT_AUTHOR}" >> "$GITHUB_OUTPUT"
          echo "commit_date=${COMMIT_DATE}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "previous_release_published_at=${PREVIOUS_RELEASE_PUBLISHED_AT}" >> "$GITHUB_OUTPUT"
          echo "log_since_epoch=${LOG_SINCE_EPOCH}" >> "$GITHUB_OUTPUT"
          echo "log_until_epoch=${LOG_UNTIL_EPOCH}" >> "$GITHUB_OUTPUT"
          echo "previous_version=${PREVIOUS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "previous_version_commit=${PREVIOUS_VERSION_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "force_update=${FORCE_UPDATE}" >> "$GITHUB_OUTPUT"

          {
            echo "changelog<<EOF"
            echo "${CHANGELOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          RELEASE_URL="https://github.com/msm9527/msm-wiki/releases/tag/${RELEASE_VERSION}"
          if [ "${FORCE_UPDATE}" != "true" ] && [ "${CHANNEL}" = "stable" ]; then
            STATUS="$(curl -I -s -o /dev/null -w '%{http_code}' "${RELEASE_URL}")"
            if [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 400 ]; then
              echo "检测到版本 ${RELEASE_VERSION} 已存在于 Release 页面 (${RELEASE_URL})，跳过后续任务"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          echo "构建通道: ${CHANNEL} (${CHANNEL_NAME})"
          echo "构建版本: ${RELEASE_VERSION} (源版本: ${BASE_VERSION})"
          echo "构建分支: ${BRANCH}"
          echo "提交 SHA: ${COMMIT_SHA}"
          echo "最新提交: ${COMMIT_MESSAGE}"
          echo "提交数量: ${COMMIT_COUNT}"

      - name: 使用 AI 生成版本总结
        if: steps.meta.outputs.skip != 'true'
        id: ai_summary
        uses: actions/github-script@v7
        env:
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');

            const previousReleasePublishedAt = '${{ steps.meta.outputs.previous_release_published_at }}';
            const logSinceEpoch = '${{ steps.meta.outputs.log_since_epoch }}';
            const logUntilEpoch = '${{ steps.meta.outputs.log_until_epoch }}';
            const sinceNum = Number(logSinceEpoch);
            const untilNum = Number(logUntilEpoch);
            const hasSince = logSinceEpoch && logSinceEpoch.trim();
            const hasUntil = logUntilEpoch && logUntilEpoch.trim();
            const hasValidWindow = hasSince && hasUntil && !Number.isNaN(sinceNum) && !Number.isNaN(untilNum) && sinceNum < untilNum;

            // 与 prepare 阶段保持一致：按发布时间窗口获取提交
            // 使用 %x1F 作为分隔符避免提交信息中的特殊字符干扰
            const logArgs = ['--pretty=format:%h%x1F%s%x1F%an%x1F%ar'];

            if (hasValidWindow) {
              logArgs.push(`--since=@${logSinceEpoch}`);
            } else {
              // 首次发布、未获取到上一版发布时间或窗口异常时，回退最近 100 条
              logArgs.push('-100');
            }
            if (hasUntil) {
              logArgs.push(`--until=@${logUntilEpoch}`);
            }

            const gitLogCmd = `git log ${logArgs.join(' ')}`;
            if (hasValidWindow) {
              console.log(`按发布时间窗口获取提交: since=${logSinceEpoch}, until=${logUntilEpoch}`);
            } else if (hasSince && hasUntil && !Number.isNaN(sinceNum) && !Number.isNaN(untilNum) && sinceNum >= untilNum) {
              console.log(`发布时间窗口异常，回退获取最近 100 条提交: since=${logSinceEpoch}, until=${logUntilEpoch}`);
            } else {
              console.log('未找到有效发布时间窗口，回退获取最近 100 条提交');
            }

            const commits = execSync(gitLogCmd, { encoding: 'utf-8' })
              .split('\n')
              .filter(line => line.trim())
              .map(line => {
                // 使用 %x1F (Unit Separator) 分隔，避免提交信息中的特殊字符干扰
                const parts = line.split('\x1F');
                if (parts.length >= 4) {
                  return {
                    hash: parts[0],
                    subject: parts[1],
                    author: parts[2],
                    date: parts[3]
                  };
                }
                return null;
              })
              .filter(commit => commit !== null);

            console.log(`实际获取到 ${commits.length} 个提交记录`);

            if (commits.length === 0) {
              core.setOutput('summary', '本次发布窗口内无新增提交');
              return;
            }

            // 如果没有 API Key，使用默认总结
            if (!process.env.MODELSCOPE_API_KEY) {
              console.log('未配置 MODELSCOPE_API_KEY，使用默认总结');
              const summary = previousReleasePublishedAt
                ? `本次版本从 ${previousReleasePublishedAt} 之后更新，包含 ${commits.length} 个提交，主要更新：${commits[0].subject}`
                : `本次构建包含 ${commits.length} 个提交，主要更新：${commits[0].subject}`;
              core.setOutput('summary', summary);
              return;
            }

            // 调用 ModelScope API 生成总结（OpenAI 兼容格式）
            try {
              const modelCandidates = ['Qwen/Qwen3.5-35B-A3B', 'ZhipuAI/GLM-5'];
              let summary = '';
              let lastError = null;

              for (const modelName of modelCandidates) {
                try {
                  console.log(`尝试使用模型: ${modelName}`);
                  const response = await fetch('https://api-inference.modelscope.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'Authorization': `Bearer ${process.env.MODELSCOPE_API_KEY}`
                    },
                    body: JSON.stringify({
                      model: modelName,
                      messages: [
                        {
                          role: 'system',
                          content: '你是一个专业的软件版本发布助手，擅长分析 Git 提交记录并生成结构化的版本发布文档。'
                        },
                        {
                          role: 'user',
                          content: `请分析以下 Git 提交记录，生成结构化的版本发布文档。

              提交记录（共 ${commits.length} 个）：
              ${commits.map(c => `- ${c.subject} (${c.author}, ${c.date})`).join('\n')}
            
              要求：
                1. 用中文输出
                2. 按照以下格式分类输出：

            ### ✨ 新增（Added）
            - 新增的功能或特性
  
            ### 🔧 变更（Changed）
            - 行为调整、重构、配置变更等
  
            ### 🐛 修复（Fixed）
            - Bug 修复、问题解决等
  
            ### ⚠️ 废弃（Deprecated）
            - 即将废弃的功能（如果有）
  
            ### 📝 备注（Notes）
            - 重要的使用注意事项或兼容性说明（如果有）
  
            3. **重要**：如果某个分类没有内容，完全省略该分类的标题和内容，不要输出"（无）"
            4. 每个要点简洁明了，不超过 30 字；最好不要太多太长
            5. 合并相似的提交,关于一下代码和打包以及不是功能上的提交就不要体现总结出来了
            6. 突出重要变更, 一些没必要的就不体现出来了，只体现出功能上和bug上的
            7. 只输出有内容的分类和要点，不要其他内容，你就深度总结一下`
                        }
                      ],
                      temperature: 0.7,
                      max_tokens: 1024,
                      stream: false
                    })
                  });

                  if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API 请求失败: ${response.status} - ${errorText}`);
                  }

                  const data = await response.json();
                  if (!data.choices || !data.choices[0] || !data.choices[0].message || !data.choices[0].message.content) {
                    throw new Error('API 响应格式异常');
                  }

                  summary = data.choices[0].message.content.trim().replace(/^- - /gm, '- ');
                  console.log(`模型 ${modelName} 调用成功`);
                  console.log('AI 生成的总结:');
                  console.log(summary);
                  if (data.usage) {
                    console.log(`\n使用的 tokens: 输入=${data.usage.prompt_tokens}, 输出=${data.usage.completion_tokens}, 总计=${data.usage.total_tokens}`);
                  }
                  break;
                } catch (modelError) {
                  lastError = modelError;
                  console.error(`模型 ${modelName} 调用失败:`, modelError.message);
                }
              }

              if (summary) {
                core.setOutput('summary', summary);
              } else {
                throw (lastError || new Error('所有候选模型均调用失败'));
              }
            } catch (error) {
              console.error('AI 总结失败:', error.message);
              // 失败时使用默认总结
              const summary = previousReleasePublishedAt
                ? `本次版本从 ${previousReleasePublishedAt} 之后更新，包含 ${commits.length} 个提交，主要更新：${commits[0].subject}`
                : `本次构建包含 ${commits.length} 个提交，主要更新：${commits[0].subject}`;
              core.setOutput('summary', summary);
            }

  build:
    name: 打包编译
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runs_on: ubuntu-24.04
            goos: linux
            goarch: amd64
          - target: linux-amd64-v3
            runs_on: ubuntu-24.04
            goos: linux
            goarch: amd64
            goamd64: "v3"
          - target: linux-amd64-musl
            runs_on: ubuntu-24.04
            goos: linux
            goarch: amd64
          - target: linux-amd64-musl-v3
            runs_on: ubuntu-24.04
            goos: linux
            goarch: amd64
            goamd64: "v3"
          - target: linux-arm64
            runs_on: ubuntu-24.04
            goos: linux
            goarch: arm64
          - target: linux-arm64-musl
            runs_on: ubuntu-24.04
            goos: linux
            goarch: arm64
          - target: linux-armv7
            runs_on: ubuntu-24.04
            goos: linux
            goarch: arm
            goarm: "7"
          - target: linux-armv6
            runs_on: ubuntu-24.04
            goos: linux
            goarch: arm
            goarm: "6"
          # - target: linux-386
          #   runs_on: ubuntu-24.04
          #   goos: linux
          #   goarch: "386"
          - target: darwin-amd64
            runs_on: macos-15-intel
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            runs_on: macos-15
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout MSM 仓库
        uses: actions/checkout@v4
        with:
          repository: msm9527/msm
          ref: ${{ needs.prepare.outputs.branch }}
          token: ${{ secrets.MSM_REPO_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum

      - name: 缓存 Go 构建产物
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('backend/go.sum') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 缓存前端依赖
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: 构建 supervisord（嵌入资源）
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          GOAMD64: ${{ matrix.goamd64 || '' }}
          CGO_ENABLED: ${{ matrix.goos == 'darwin' && '1' || '0' }}
        run: |
          set -euo pipefail
          SUPERVISORD_COMMIT="$(head -n 1 backend/cmd/msm/.supervisord.version | tr -d '\r\n')"
          if [ -z "${SUPERVISORD_COMMIT}" ]; then
            echo "error: backend/cmd/msm/.supervisord.version 为空" >&2
            exit 1
          fi
          echo "supervisord commit: ${SUPERVISORD_COMMIT}"

          rm -rf /tmp/supervisord
          git clone https://github.com/ochinchina/supervisord.git /tmp/supervisord
          git -C /tmp/supervisord checkout "${SUPERVISORD_COMMIT}"

          (cd /tmp/supervisord && go build -ldflags="-s -w" -o supervisord)
          cp /tmp/supervisord/supervisord backend/cmd/msm/supervisord

      - name: 构建前端并复制到后端（嵌入资源）
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

          test -d dist

          rm -rf ../backend/cmd/msm/frontend/dist
          mkdir -p ../backend/cmd/msm/frontend
          cp -r dist ../backend/cmd/msm/frontend/

      - name: 编译 MSM（二进制优化版）
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          GOAMD64: ${{ matrix.goamd64 || '' }}
          CGO_ENABLED: ${{ matrix.goos == 'darwin' && '1' || '0' }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p dist
          cd backend
          go build -ldflags="-s -w" -o ../dist/msm ./cmd/msm
          cd ..
          chmod +x dist/msm

          # 统一打包 CLI 二进制为 tar.gz（macOS / Linux 一致）
          tar -czf "dist/msm-${VERSION}-${{ matrix.target }}.tar.gz" -C dist msm
          rm -f dist/msm

      - name: 上传构建产物 - 二进制 (macOS)
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: msm-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: dist/msm-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

      - name: 上传构建产物 (Linux)
        if: matrix.goos != 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: msm-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: dist/msm-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: 发布构建产物（${{ needs.prepare.outputs.channel_name }}）
    needs: [prepare, build]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 当前仓库（msm-wiki）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 创建/更新版本 tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          SHA="${GITHUB_SHA}"
          CHANNEL_NAME="${{ needs.prepare.outputs.channel_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 删除旧的版本 tag（如果存在）
          git tag -d "${VERSION}" >/dev/null 2>&1 || true
          git push origin ":refs/tags/${VERSION}" || true

          # 创建新的版本 tag
          git tag -a "${VERSION}" -m "${CHANNEL_NAME} 每日构建 ${VERSION}" "${SHA}"
          git push origin "refs/tags/${VERSION}"

      - name: 创建/更新 GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.version }}
          name: 🚀 MSM ${{ needs.prepare.outputs.version }}（${{ needs.prepare.outputs.channel_name }}）
          body: |
            <div align="center">

            # 📦 MSM ${{ needs.prepare.outputs.version }}

            ![Build Status](https://img.shields.io/badge/build-passing-brightgreen)
            ![Version](https://img.shields.io/badge/version-${{ needs.prepare.outputs.version }}-blue)
            ![Platform](https://img.shields.io/badge/platform-linux%20%7C%20macos-lightgrey)

            **${{ needs.prepare.outputs.channel_name }}每日自动构建 · 包含最新代码更新**

            </div>

            ---

            ## ✨ 本次更新

            ${{ needs.prepare.outputs.ai_summary }}

            ---

            ## 📋 构建信息

            | 项目 | 内容 |
            |------|------|
            | **版本号** | `${{ needs.prepare.outputs.version }}` |
            | **发布通道** | `${{ needs.prepare.outputs.channel }}` |
            | **源仓库** | [msm9527/msm](https://github.com/msm9527/msm) |
            | **构建分支** | `${{ needs.prepare.outputs.branch }}` 🌿 |
            | **源提交** | [`${{ needs.prepare.outputs.commit_sha_short }}`](https://github.com/msm9527/msm/commit/${{ needs.prepare.outputs.commit_sha }}) |
            | **构建时间** | ${{ needs.prepare.outputs.build_time }} ⏰ |

            <details>
            <summary>🎯 最新提交详情</summary>

            **${{ needs.prepare.outputs.commit_message }}**

            - 📅 时间: ${{ needs.prepare.outputs.commit_date }}
            - 🔗 链接: https://github.com/msm9527/msm/commit/${{ needs.prepare.outputs.commit_sha }}

            </details>

            ---

            ## 💾 下载安装

            ### 🖥️ 命令行版本（CLI）

            <details open>
            <summary><b>Linux 平台</b></summary>

            | 架构 | 文件 | 说明 |
            |------|------|------|
            | **amd64** | [`msm-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz) | 标准版本（推荐） |
            | **amd64-v3** | [`msm-${{ needs.prepare.outputs.version }}-linux-amd64-v3.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-amd64-v3.tar.gz) | 优化版（需 AVX2） |
            | **amd64-musl** | [`msm-${{ needs.prepare.outputs.version }}-linux-amd64-musl.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-amd64-musl.tar.gz) | Alpine Linux |
            | **amd64-musl-v3** | [`msm-${{ needs.prepare.outputs.version }}-linux-amd64-musl-v3.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-amd64-musl-v3.tar.gz) | Alpine 优化版 |
            | **arm64** | [`msm-${{ needs.prepare.outputs.version }}-linux-arm64.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-arm64.tar.gz) | ARM 64位 |
            | **arm64-musl** | [`msm-${{ needs.prepare.outputs.version }}-linux-arm64-musl.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-arm64-musl.tar.gz) | ARM Alpine |
            | **armv7** | [`msm-${{ needs.prepare.outputs.version }}-linux-armv7.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-armv7.tar.gz) | ARM 32位 (v7) |
            | **armv6** | [`msm-${{ needs.prepare.outputs.version }}-linux-armv6.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-armv6.tar.gz) | ARM 32位 (v6) |

            > **💡 提示：** amd64-v3 版本针对较新的 CPU 进行了优化（需要支持 AVX、AVX2 等指令集），性能更好但兼容性较低。如果不确定，请使用标准的 amd64 版本。

            </details>

            <details>
            <summary><b>macOS 平台</b></summary>

            | 架构 | 文件 | 说明 |
            |------|------|------|
            | **Intel** | [`msm-${{ needs.prepare.outputs.version }}-darwin-amd64.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-darwin-amd64.tar.gz) | Intel 芯片 Mac |
            | **Apple Silicon** | [`msm-${{ needs.prepare.outputs.version }}-darwin-arm64.tar.gz`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-darwin-arm64.tar.gz) | M1/M2/M3 芯片 |

            </details>

            ### 🖼️ 桌面应用版本（Desktop）

            <details>
            <summary><b>macOS 桌面应用</b></summary>

            | 架构 | 文件 | 说明 |
            |------|------|------|
            | **Intel** | [`msm-desktop-${{ needs.prepare.outputs.version }}-darwin-amd64.dmg`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-desktop-${{ needs.prepare.outputs.version }}-darwin-amd64.dmg) | Intel 芯片 Mac |
            | **Apple Silicon** | [`msm-desktop-${{ needs.prepare.outputs.version }}-darwin-arm64.dmg`](https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-desktop-${{ needs.prepare.outputs.version }}-darwin-arm64.dmg) | M1/M2/M3 芯片 |

            **安装步骤：**
            1. 下载对应架构的 DMG 文件
            2. 双击 DMG 文件，将应用拖入 Applications 文件夹
            3. 首次打开时，如果遇到"无法验证开发者"提示：
               - 打开"系统设置" → "隐私与安全性"
               - 点击"仍要打开"按钮
            4. 由于应用未经过 Apple 公证，提示文件损坏执行下边命令
               - /usr/bin/xattr -cr "/Applications/msm-desktop.app" && /usr/bin/codesign -fs - "/Applications/msm-desktop.app"

            </details>

            ---

            ## 🚀 快速安装

            ### 一键安装脚本（推荐）

            ```bash
            curl -fsSL ${{ needs.prepare.outputs.install_script_url }} | sudo bash
            ```

            ### 手动安装（以 Linux amd64 为例）

            ```bash
            # 下载
            wget https://github.com/msm9527/msm-wiki/releases/download/${{ needs.prepare.outputs.version }}/msm-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz

            # 解压
            tar -xzf msm-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz

            # 安装
            sudo mv msm /usr/local/bin/msm
            sudo chmod +x /usr/local/bin/msm

            # 验证
            msm --version
            ```

            ### Docker 安装

            ```bash
            # 拉取镜像
            docker pull msmbox/msm:${{ needs.prepare.outputs.version }}

            # 运行容器
            docker run -d \
              --name msm \
              -p 7777:7777 \
              -v /opt/msm:/opt/msm \
              msmbox/msm:${{ needs.prepare.outputs.version }}
            ```

            ---

            ## 📚 文档与支持

            - 📖 [完整文档](https://msm9527.github.io/msm-wiki/)
            - 🚀 [快速开始](https://msm9527.github.io/msm-wiki/zh/guide/install.html)
            - 📝 [版本发布](${{ needs.prepare.outputs.release_docs_url }})
            - 💬 [问题反馈](https://github.com/msm9527/msm/issues)

            ---

            <div align="center">

            **🤖 由 GitHub Actions 自动构建**

            [![GitHub](https://img.shields.io/badge/GitHub-msm9527%2Fmsm-blue?logo=github)](https://github.com/msm9527/msm)
            [![Documentation](https://img.shields.io/badge/docs-msm--wiki-green)](https://msm9527.github.io/msm-wiki/)
            [![Docker](https://img.shields.io/badge/docker-msmbox%2Fmsm-blue?logo=docker)](https://hub.docker.com/r/msmbox/msm)

            </div>
          makeLatest: ${{ needs.prepare.outputs.is_stable }}
          prerelease: ${{ needs.prepare.outputs.is_beta }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            dist/**/msm-${{ needs.prepare.outputs.version }}-*.tar.gz

      - name: 更新 Wiki 版本发布页面
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');

            const version = '${{ needs.prepare.outputs.version }}';
            const baseVersion = '${{ needs.prepare.outputs.base_version }}';
            const channel = '${{ needs.prepare.outputs.channel }}';
            const channelName = '${{ needs.prepare.outputs.channel_name }}';
            const aiSummary = ${{ toJSON(needs.prepare.outputs.ai_summary) }};
            const commitSha = '${{ needs.prepare.outputs.commit_sha_short }}';
            const commitShaFull = '${{ needs.prepare.outputs.commit_sha }}';
            const commitMessage = ${{ toJSON(needs.prepare.outputs.commit_message) }};
            const commitAuthor = ${{ toJSON(needs.prepare.outputs.commit_author) }};
            const commitDate = '${{ needs.prepare.outputs.commit_date }}';
            const latestVersionMarker = '${{ needs.prepare.outputs.latest_marker }}';
            const historyVersionMarker = '${{ needs.prepare.outputs.history_marker }}';
            const releasesPath = '${{ needs.prepare.outputs.release_notes_path }}';

            // 读取现有的版本发布页面
            let content = fs.readFileSync(releasesPath, 'utf-8');

            // commitDate 已在 prepare 阶段统一转换为北京时间字符串
            const dateStr = commitDate;

            // 构建新版本的内容（与新版 releases 页面结构对齐）
            const versionLabel = channel === 'beta'
              ? `当前 Beta 版本：\`${version}\``
              : `当前稳定版本：\`v${baseVersion}\``;
            const newVersionContent = `
            > ${versionLabel}  
            > 发布时间：${dateStr}  
            > - 发布页：<https://github.com/msm9527/msm-wiki/releases/tag/${version}>  
            > - 下载方式：同一发布页内提供各平台二进制与安装包
            
            ${aiSummary}
            
            ::: details 📋 构建信息
            - **发布通道**: ${channel}（${channelName}）
            - **源提交**: [\`${commitSha}\`](https://github.com/msm9527/msm/commit/${commitShaFull})
            - **提交信息**: ${commitMessage}
            - **提交作者**: ${commitAuthor}
            - **提交时间**: ${commitDate}
            :::
            
            ---
            `;

            if (content.includes(latestVersionMarker) && content.includes(historyVersionMarker)) {
              // 找到最新版本和历史版本的位置
              const latestIndex = content.indexOf(latestVersionMarker);
              const historyIndex = content.indexOf(historyVersionMarker);

              if (latestIndex !== -1 && historyIndex !== -1) {
                // 保留标题之前的内容
                const beforeLatest = content.substring(0, latestIndex + latestVersionMarker.length);
                // 保留历史版本及之后的内容
                const afterHistory = content.substring(historyIndex);

                // 重新组装：标题前 + 标题 + 新版本内容 + 历史版本及之后
                content = beforeLatest + '\n\n' + newVersionContent + '\n' + afterHistory;
              }
            } else {
              console.log('⚠️ 未找到版本标记，跳过更新');
            }

            // 写回文件
            fs.writeFileSync(releasesPath, content, 'utf-8');

            console.log(`✅ 已更新版本发布页面: ${version}`);

      - name: 提交 Wiki 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ needs.prepare.outputs.release_notes_path }}"

          if git diff --staged --quiet; then
            echo "没有需要提交的更改"
          else
            git commit -m "自动更新${{ needs.prepare.outputs.channel_name }}发布页面: ${{ needs.prepare.outputs.version }}

            - 添加版本 ${{ needs.prepare.outputs.version }} 的发布信息
            - AI 生成的更新总结
            - 构建信息和下载链接

            Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"

            # 推送前先获取远程状态，处理可能的冲突
            git fetch origin
            if ! git push; then
              echo "推送失败，检测到远程更新，正在同步..."
              git pull --rebase origin main
              if ! git push; then
                echo "❌ 推送仍然失败，可能存在冲突"
                exit 1
              fi
              echo "✅ 已同步远程更改并推送 Wiki 更新"
            else
              echo "✅ 已推送 Wiki 更新"
            fi
          fi

  docker:
    name: 构建并推送 Docker 镜像
    needs: [prepare, release]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 准备各架构二进制文件
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"

          # 创建目录结构 binaries/{platform}/msm
          mkdir -p binaries/linux/amd64 binaries/linux/arm64 binaries/linux/arm/v7 binaries/linux/arm/v6

          # 解压并复制各架构的二进制文件
          echo "准备 linux/amd64 二进制..."
          tar -xzf "dist/msm-${VERSION}-linux-amd64/msm-${VERSION}-linux-amd64.tar.gz" -C binaries/linux/amd64

          echo "准备 linux/arm64 二进制..."
          tar -xzf "dist/msm-${VERSION}-linux-arm64/msm-${VERSION}-linux-arm64.tar.gz" -C binaries/linux/arm64

          echo "准备 linux/arm/v7 二进制..."
          tar -xzf "dist/msm-${VERSION}-linux-armv7/msm-${VERSION}-linux-armv7.tar.gz" -C binaries/linux/arm/v7

          echo "准备 linux/arm/v6 二进制..."
          tar -xzf "dist/msm-${VERSION}-linux-armv6/msm-${VERSION}-linux-armv6.tar.gz" -C binaries/linux/arm/v6

          # 验证文件结构
          echo "验证二进制文件:"
          find binaries -name msm -exec ls -lh {} \;

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送多架构 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.binary
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: msmbox/msm:${{ needs.prepare.outputs.version }},msmbox/msm:${{ needs.prepare.outputs.docker_channel_tag }}
          labels: |
            org.opencontainers.image.title=MSM
            org.opencontainers.image.description=Mosdns Singbox Mihomo Manager
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.source=https://github.com/msm9527/msm
            org.opencontainers.image.url=https://msm9527.github.io/msm-wiki/
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,push=true

      - name: 显示镜像信息
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CHANNEL_TAG="${{ needs.prepare.outputs.docker_channel_tag }}"
          echo "✅ Docker 镜像已推送到 Docker Hub"
          echo ""
          echo "镜像标签:"
          echo "  - msmbox/msm:${VERSION}"
          echo "  - msmbox/msm:${CHANNEL_TAG}"
          echo ""
          echo "支持的架构:"
          echo "  - linux/amd64"
          echo "  - linux/arm64"
          echo "  - linux/arm/v7"
          echo "  - linux/arm/v6"
          echo ""
          echo "注意: Docker 镜像使用标准 amd64 版本，amd64-v3 优化版仅作为独立二进制文件提供"
          echo ""

  upload:
    name: 上传每日构建到自定义服务器
    needs: [prepare, release]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 准备上传文件
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p upload/"${VERSION}"
          find dist -type f -name "msm-${VERSION}-*.tar.gz" -exec cp {} upload/"${VERSION}"/ \;
          printf "%s\n" "${VERSION}" > upload/.version
          echo "待上传文件列表:"
          ls -lh upload
          ls -lh upload/"${VERSION}"

      - name: 安装 sshpass
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y sshpass rsync

      - name: 传输到目标服务器
        shell: bash
        env:
          EXTRA_SERVERS: ${{ secrets.DEPLOY_SERVERS }}
        run: |
          set -euo pipefail

          VERSION="${{ needs.prepare.outputs.version }}"
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          RSYNC_SSH="ssh -o StrictHostKeyChecking=no"

          # 仅使用 DEPLOY_SERVERS 多行配置：host,user,password,target_path[,port]
          servers=()
          if [ -n "${EXTRA_SERVERS}" ]; then
            while IFS= read -r line; do
              line_trimmed="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              [ -z "$line_trimmed" ] && continue
              servers+=("$line_trimmed")
            done <<< "${EXTRA_SERVERS}"
          fi

          if [ ${#servers[@]} -eq 0 ]; then
            echo "未提供服务器信息（请在 secrets 中设置 DEPLOY_SERVERS，多行 host,user,password,target_path[,port]）"
            exit 0
          fi

          echo "即将上传到 ${#servers[@]} 个服务器:"
          for entry in "${servers[@]}"; do
            IFS=',' read -r host user pass target port <<< "$entry"
            safe_host="$(echo "$host" | sed -E 's/^(.{0,3}).*(.)$/\1*******\2/')"
            echo " - ${safe_host}"
          done

          for entry in "${servers[@]}"; do
            IFS=',' read -r host user pass target port <<< "$entry"
            if [ -z "${host}" ] || [ -z "${user}" ] || [ -z "${pass}" ] || [ -z "${target}" ]; then
              echo "跳过无效配置"
              continue
            fi

            TARGET="${target%/}"
            if [ "${CHANNEL}" = "beta" ]; then
              TARGET="${TARGET}/beta"
            fi
            PORT_OPT=""
            if [ -n "${port}" ]; then
              PORT_OPT="-p ${port}"
            fi

            sshpass -p "${pass}" ssh -o StrictHostKeyChecking=no ${PORT_OPT} "${user}@${host}" "mkdir -p \"${TARGET}\" \"${TARGET}/${VERSION}\""

            sshpass -p "${pass}" rsync -avz --no-perms --no-owner --no-group -e "${RSYNC_SSH} ${PORT_OPT}" --rsync-path="mkdir -p \"${TARGET}\" && rsync" upload/.version "${user}@${host}:${TARGET}/"
            sshpass -p "${pass}" rsync -avz --no-perms --no-owner --no-group -e "${RSYNC_SSH} ${PORT_OPT}" --rsync-path="mkdir -p \"${TARGET}/${VERSION}\" && rsync" upload/${VERSION}/ "${user}@${host}:${TARGET}/${VERSION}/"
          done

          echo "✅ 已将 .version 和打包产物上传至所有服务器"
          echo "使用方式:"
          echo "  docker pull msmbox/msm:${{ needs.prepare.outputs.docker_channel_tag }}"
          echo "  docker run -d -p 7777:7777 msmbox/msm:${{ needs.prepare.outputs.docker_channel_tag }}"

  desktop:
    name: 构建 macOS 桌面应用并追加到 Release
    needs: [prepare, release]
    runs-on: macos-15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout MSM 仓库
        uses: actions/checkout@v4
        with:
          repository: msm9527/msm
          ref: ${{ needs.prepare.outputs.branch }}
          token: ${{ secrets.MSM_REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 缓存前端依赖
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-frontend-desktop-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖与构建
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: cargo-tauri-${{ runner.os }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}

      - name: 安装前端依赖并构建（Tauri 桌面）
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: 下载 macOS CLI 构建产物
        uses: actions/download-artifact@v4
        with:
          name: msm-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: dist

      - name: 解压 CLI 二进制供 Tauri 使用
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p dist
          # 解压出 msm 可执行文件（使用 build Job 上传的 tar.gz 产物）
          tar -xzf "dist/msm-${VERSION}-${{ matrix.target }}.tar.gz" -C dist
          ls -l dist

      - name: 构建 Tauri 桌面应用
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"

          export TAURI_APP_VERSION="${VERSION}"
          export TAURI_BUILD_VERSION="${VERSION}"

          cd frontend

          WORKSPACE="$PWD"
          SRC_TAURI_DIR="$WORKSPACE/src-tauri"
          DIST_ROOT="$WORKSPACE/../dist"

          # 确保目录存在；如存在开发用的 msm 可执行文件或目录，先移除
          mkdir -p "$SRC_TAURI_DIR"
          if [ -e "$SRC_TAURI_DIR/msm" ] || [ -L "$SRC_TAURI_DIR/msm" ]; then
            rm -rf "$SRC_TAURI_DIR/msm"
          fi

          # 复制已解压好的二进制到 src-tauri/msm
          cp "$DIST_ROOT/msm" "$SRC_TAURI_DIR/msm"
          chmod +x "$SRC_TAURI_DIR/msm"

          # 复制必要的资源文件（存在才复制）
          cp about.html dist/ || true
          cp icon.png dist/ || true

          # 跳过重复的前端构建
          TAURI_CONF="$SRC_TAURI_DIR/tauri.conf.json"
          cp "$TAURI_CONF" "$TAURI_CONF.backup"
          sed -i.tmp 's/"beforeBuildCommand":[^,]*,/"beforeBuildCommand": "echo Skipping frontend build",/' "$TAURI_CONF"

          # 使用 Tauri 构建 DMG
          npm run tauri build

          # 恢复原始配置
          mv "$TAURI_CONF.backup" "$TAURI_CONF"

          # 复制 DMG 到 dist 目录，文件名带上架构
          mkdir -p "$DIST_ROOT"
          cp "$SRC_TAURI_DIR/target/release/bundle/dmg"/*.dmg "$DIST_ROOT/msm-desktop-${VERSION}-${{ matrix.target }}.dmg"

      - name: 上传桌面应用 DMG 产物
        uses: actions/upload-artifact@v4
        with:
          name: msm-desktop-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: dist/msm-desktop-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.dmg
          if-no-files-found: ignore

      - name: 将 DMG 附加到已有 Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/msm-desktop-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.dmg
          fail_on_unmatched_files: false

  pages:
    name: 构建并发布 Wiki 到 GitHub Pages
    needs: [prepare, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout Wiki 仓库
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 缓存文档依赖
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-docs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Set Pages artifact name
        id: pages_artifact
        run: echo "name=github-pages-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
          name: ${{ steps.pages_artifact.outputs.name }}

      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ steps.pages_artifact.outputs.name }}
        continue-on-error: true

      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ steps.pages_artifact.outputs.name }}

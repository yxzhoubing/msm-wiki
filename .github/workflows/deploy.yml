name: Deploy Wiki to GitHub Pages

on:
  push:
    branches:
      - main
    # 只在文档 / 站点相关文件发生变更时自动触发部署
    paths:
      - 'docs/**'
      - 'docs/.vitepress/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'package-lock.json'
  # 注意：由 GitHub Actions 使用 GITHUB_TOKEN 推送的提交不会触发 push 工作流（防递归机制）
  # 因此需要用 workflow_run 来接住「每日构建 MSM（稳定版/Beta）」里自动提交 docs 的场景，保证 Pages 能自动更新。
  workflow_run:
    workflows:
      - 每日构建 MSM（稳定版）
      - 每日构建 MSM（Beta）
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      pages_artifact_name: ${{ steps.pages_artifact.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Set Pages artifact name
        id: pages_artifact
        run: echo "name=github-pages-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
          name: ${{ steps.pages_artifact.outputs.name }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ needs.build.outputs.pages_artifact_name }}
        continue-on-error: true

      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ needs.build.outputs.pages_artifact_name }}
